name: 手动清理 7 天前 Actions 运行记录
on:
  workflow_dispatch: # 仅手动触发，无定时

permissions:
  actions: write
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      # 关键：必须拉取仓库上下文
      - name: Checkout code
        uses: actions/checkout@v4

      # 安装 GitHub CLI
      - name: Install GitHub CLI
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 清理超过 7 天的运行记录
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BEFORE=$(date -u -d "-7 days" +%Y-%m-%dT%H:%M:%SZ)
          echo "🗑️ 将要删除早于：$BEFORE 的所有运行记录"

          # 批量删除
          gh run list --limit 1000 --json databaseId,createdAt \
          | jq -r --arg time "$BEFORE" \
            '.[] | select(.createdAt < $time) | .databaseId' \
          | xargs -r -I {} gh run delete {}

          echo "✅ 老旧 Actions 记录清理完毕"
