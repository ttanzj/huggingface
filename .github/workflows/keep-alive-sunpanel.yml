name: Keep ttanz/sun Alive (No Sleep Random Schedule)

on:
  schedule:
    - cron: '17 3 * * *'→ Runs at 03:17
    - cron: '42 11 * * *'→ Runs at 11:42
    - cron: '29 19 * * *'→ Runs at 19:29
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: 50% probability gate
        id: gate
        run: |
          R=$(( RANDOM % 100 ))
          echo "🎯 Random value: $R"

          if [ "$R" -lt 50 ]; then
            echo "run=true" >> $GITHUB_OUTPUT
            echo "✅ Will ping HF"
          else
            echo "run=false" >> $GITHUB_OUTPUT
            echo "⏭ Skip this run"
          fi

      - name: Ping HuggingFace Space
        if: steps.gate.outputs.run == 'true'
        run: |
          echo "🌐 Pinging HF Space..."

          RESPONSE=$(curl -s -L -m 30 \
            -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/120 Safari/537.36" \
            -w "HTTP_STATUS:%{http_code}" \
            https://ttanz-sun.hf.space)

          STATUS=$(echo "$RESPONSE" | sed -n 's/.*HTTP_STATUS://p')

          echo "📡 Status: $STATUS"

          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
            echo "✅ Success"
          else
            echo "⚠️ Unexpected response"
          fi

      - name: Summary
        run: echo "Done at $(date -u)"
