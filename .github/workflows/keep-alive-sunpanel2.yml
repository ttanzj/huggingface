name: SunPanel Keep Alive (每12小时)

on:
  schedule:
    - cron: '0 */12 * * *'     # 每12小时执行一次（UTC 时间 0点 和 12点）
  workflow_dispatch:           # 允许手动触发测试

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    
    steps:
      - name: 访问 Hugging Face Space 保活
        run: |
          echo "=== 开始保活 SunPanel ==="
          echo "当前 UTC 时间: $(date -u)"
          
          # 多次尝试访问，提高成功率
          for i in {1..3}; do
            echo "第 ${i} 次尝试访问..."
            curl -I -L -f --max-time 30 "https://ttanzj-sun2.hf.space/" && break || sleep 10
          done
          
          echo "保活请求发送完成（$(date -u)）"

      - name: 显示执行结果
        run: echo "保活任务执行完毕"
