name: Keep ttanzj/Photos Alive (Daily Random)

on:
  schedule:
    - cron: '*/30 * * * *'   # 每 30 分钟检查一次（GitHub 会随机分配实际运行时间）
  workflow_dispatch:         # 允许手动测试

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    timeout-minutes: 5       # 防止意外卡住，最多跑 5 分钟

    steps:
      - name: Wake up ttanzj/Photos Space
        run: |
          echo "🌟 Starting wake up at $(date -u)"
          echo "Target: https://ttanzj-photos.hf.space"
          
          # 发送请求（带浏览器 User-Agent，更容易唤醒）
          RESPONSE=$(curl -I -s -L -m 30 \
            -A "Mozilla/5.0 (compatible; HF-KeepAlive/1.0)" \
            https://ttanzj-photos.hf.space)
          
          echo "Response headers:"
          echo "$RESPONSE"
          
          if echo "$RESPONSE" | grep -q "200\|302\|503"; then
            echo "✅ Successfully pinged! Space should be awake now."
          else
            echo "⚠️  Got unexpected response, but ping was sent."
          fi

      - name: Summary
        run: echo "Job completed at $(date -u)"
