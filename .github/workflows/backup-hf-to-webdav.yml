name: Backup HF Datasets to WebDAV

on:
  schedule:
    - cron: '0 0 * * *'  # 每天自动运行
  workflow_dispatch:    # 👈 这个就是【手动触发】开关

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -U pip
          pip install datasets huggingface_hub

      - name: Login to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          huggingface-cli login --token "$HF_TOKEN"

      - name: Backup datasets
        run: |
          mkdir -p backups
          DATE=$(date -u +%Y-%m-%d)

          # 在这里填你的多个数据集
          DATASETS=(
            "ttanz/sun"
            "ttanz/openlist"
                     )

          echo "BACKUP_SUCCESS=true" >> $GITHUB_ENV

          for ds in "${DATASETS[@]}"; do
            echo "===== Backup $ds ====="
            SAFE_NAME=$(echo "$ds" | tr '/' '_')
            ZIP_FILE="backups/hf_${SAFE_NAME}_${DATE}.tar.gz"

            if python -c "
            from datasets import load_dataset
            ds = load_dataset('$ds')
            ds.save_to_disk('./tmp_ds')
            "; then
              tar -zcvf "$ZIP_FILE" tmp_ds/
              rm -rf tmp_ds
            else
              echo "ERROR: $ds 备份失败"
              echo "BACKUP_SUCCESS=false" >> $GITHUB_ENV
            fi
          done

      # 上传到 WebDAV
      - name: Upload to WebDAV
        uses: b3buntaro/webdav-upload-action@v1
        with:
          host: ${{ secrets.WEBDAV_HOST }}
          username: ${{ secrets.WEBDAV_USER }}
          password: ${{ secrets.WEBDAV_PASS }}
          local_path: backups/
          remote_path: /backups/huggingface/

      # 只有全部成功，才清理7天前的旧备份
      - name: Clean old files (keep 7 days)
        if: env.BACKUP_SUCCESS == 'true'
        uses: b3buntaro/webdav-upload-action@v1
        with:
          host: ${{ secrets.WEBDAV_HOST }}
          username: ${{ secrets.WEBDAV_USER }}
          password: ${{ secrets.WEBDAV_PASS }}
          remote_path: /backups/huggingface/
          clean_remote: true
          retention_days: 7
