name: Backup Multiple HF Datasets to WebDAV

on:
  schedule:
    - cron: '0 2 * * *'        # 每天北京时间上午10点执行
  workflow_dispatch:           # 支持手动触发

jobs:
  backup:
    runs-on: ubuntu-latest
    
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      WEBDAV_HOST: ${{ secrets.WEBDAV_HOST }}
      WEBDAV_USER: ${{ secrets.WEBDAV_USER }}
      WEBDAV_PASS: ${{ secrets.WEBDAV_PASS }}
      BACKUP_PATH: "/huggingface"     # WebDAV 备份根目录

    strategy:
      matrix:
        dataset:
          - "ttanz/sun"
          - "ttanz/openlist"
          # 在这里继续添加你需要备份的数据集（支持私有）

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y rclone tree zip

      - name: Configure rclone for WebDAV
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf << EOF
          [webdav]
          type = webdav
          url = ${WEBDAV_HOST}
          vendor = other
          user = ${WEBDAV_USER}
          pass = $(rclone obscure "${WEBDAV_PASS}")
          EOF

      - name: Login to Hugging Face
        run: huggingface-cli login --token $HF_TOKEN --add-to-git-credential

      - name: Generate backup date
        id: date
        run: echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Backup dataset - ${{ matrix.dataset }}
        run: |
          DATASET="${{ matrix.dataset }}"
          DATASET_NAME=$(echo $DATASET | tr '/' '-')
          BACKUP_DIR="${{ env.BACKUP_PATH }}/${{ env.DATE }}/${DATASET_NAME}"
          
          echo "=== Backing up: $DATASET ==="
          echo "Backup path: $BACKUP_DIR"
          
          # 创建本地临时目录
          mkdir -p ./dataset_backup
          rm -rf ./dataset_backup/*   # 清理上次残留
          
          # 下载数据集
          python3 - <<EOF
          from huggingface_hub import snapshot_download
          import os
          
          snapshot_download(
              repo_id="${DATASET}",
              repo_type="dataset",
              local_dir="./dataset_backup",
              local_dir_use_symlinks=False,
              allow_patterns=["*"],
              ignore_patterns=[".gitattributes"]
          )
          print("✅ Dataset download completed.")
          EOF

          # 上传到 WebDAV
          echo "Uploading to WebDAV..."
          rclone mkdir webdav:"${BACKUP_DIR}"
          
          rclone sync ./dataset_backup webdav:"${BACKUP_DIR}" \
            --progress \
            --transfers=8 \
            --checkers=16 \
            --verbose

      - name: Cleanup old backups (keep last 7 days)
        if: success()
        run: |
          echo "🧹 Cleaning up backups older than 7 days..."
          rclone delete webdav:"${{ env.BACKUP_PATH }}" \
            --min-age 7d \
            --verbose || true

      - name: List current backups
        if: success()
        run: |
          echo "📋 Current backups on WebDAV:"
          rclone ls webdav:"${{ env.BACKUP_PATH }}" --dirs-only
