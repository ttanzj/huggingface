name: Backup HF Datasets to WebDAV (Multi + 7d + Manual)

on:
  schedule:
    - cron: '0 0 * * *'  # 每天 UTC 0点（北京时间8点）✅ 正确5位
  workflow_dispatch:     # ✅ 手动触发

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -U pip
          pip install datasets huggingface_hub

      - name: Login to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          huggingface-cli login --token "$HF_TOKEN"

      - name: Backup datasets
        run: |
          mkdir -p backups
          DATE=$(date -u +%Y-%m-%d)

          # 你的数据集列表
          DATASETS=(
            "ttanz/sun"
            "ttanz/openlist"
          )

          echo "BACKUP_SUCCESS=true" >> $GITHUB_ENV

          for ds in "${DATASETS[@]}"; do
            echo "===== 正在备份: $ds ====="
            SAFE_NAME=$(echo "$ds" | tr '/' '_')
            ARCHIVE="backups/hf_${SAFE_NAME}_${DATE}.tar.gz"

            if python -c "
            from datasets import load_dataset
            ds = load_dataset('$ds')
            ds.save_to_disk('./tmp_ds')
            "; then
              tar -zcvf "$ARCHIVE" tmp_ds/
              rm -rf tmp_ds
            else
              echo "ERROR: 备份失败 $ds"
              echo "BACKUP_SUCCESS=false" >> $GITHUB_ENV
            fi
          done

      # 上传到 WebDAV (稳定官方 rclone)
      - name: Upload to WebDAV
        uses: rclone/rclone-action@v1
        with:
          config: |
            [webdav]
            type = webdav
            url = ${{ secrets.WEBDAV_HOST }}
            vendor = other
            user = ${{ secrets.WEBDAV_USER }}
            pass = ${{ secrets.WEBDAV_PASS }}
          args: copy backups/ webdav:/backups/huggingface/

      # 清理7天前旧文件（仅成功时清理）
      - name: Clean old backups (keep 7 days)
        if: env.BACKUP_SUCCESS == 'true'
        uses: rclone/rclone-action@v1
        with:
          config: |
            [webdav]
            type = webdav
            url = ${{ secrets.WEBDAV_HOST }}
            vendor = other
            user = ${{ secrets.WEBDAV_USER }}
            pass = ${{ secrets.WEBDAV_PASS }}
          args: delete --min-age 7d webdav:/backups/huggingface/
