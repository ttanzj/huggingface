name: Backup Multiple HF Datasets to WebDAV

on:
  schedule:
    - cron: '0 2 * * *'        # 每天北京时间上午10点
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      WEBDAV_HOST: ${{ secrets.WEBDAV_HOST }}
      WEBDAV_USER: ${{ secrets.WEBDAV_USER }}
      WEBDAV_PASS: ${{ secrets.WEBDAV_PASS }}
      BACKUP_PATH: "/huggingface"

    strategy:
      matrix:
        dataset:
          - "ttanz/sun"      # ← 修改成你的数据集
          - "ttanz/openlist"
          # - "org-name/private-dataset"

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y rclone zip unzip
          
          # 安装 Hugging Face CLI 和 Python 库
          pip install --upgrade pip
          pip install huggingface_hub

      - name: Configure rclone for WebDAV
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf << EOF
          [webdav]
          type = webdav
          url = ${WEBDAV_HOST}
          vendor = other
          user = ${WEBDAV_USER}
          pass = $(rclone obscure "${WEBDAV_PASS}")
          EOF

      - name: Login to Hugging Face
        run: |
          huggingface-cli login --token $HF_TOKEN --add-to-git-credential
          echo "✅ Successfully logged into Hugging Face"

      - name: Generate backup date
        id: date
        run: echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Backup dataset - ${{ matrix.dataset }}
        run: |
          DATASET="${{ matrix.dataset }}"
          DATASET_NAME=$(echo $DATASET | tr '/' '-')
          BACKUP_DIR="${{ env.BACKUP_PATH }}/${{ env.DATE }}/${DATASET_NAME}"
          
          echo "=== 开始备份: $DATASET ==="
          echo "备份路径: $BACKUP_DIR"
          
          mkdir -p ./dataset_backup
          rm -rf ./dataset_backup/*
          
          python3 - <<EOF
          from huggingface_hub import snapshot_download
          
          snapshot_download(
              repo_id="${DATASET}",
              repo_type="dataset",
              local_dir="./dataset_backup",
              local_dir_use_symlinks=False,
              allow_patterns=["*"],
              ignore_patterns=[".gitattributes"]
          )
          print("✅ Dataset downloaded successfully")
          EOF

          # 上传到 WebDAV
          echo "📤 正在上传到 WebDAV..."
          rclone mkdir webdav:"${BACKUP_DIR}"
          
          rclone sync ./dataset_backup webdav:"${BACKUP_DIR}" \
            --progress \
            --transfers=8 \
            --checkers=16 \
            --verbose

      - name: Cleanup old backups (keep last 7 days)
        if: success()
        run: |
          echo "🧹 清理超过7天的旧备份..."
          rclone delete webdav:"${{ env.BACKUP_PATH }}" \
            --min-age 7d \
            --verbose || true

      - name: List current backups
        if: success()
        run: |
          echo "📋 当前备份列表："
          rclone ls webdav:"${{ env.BACKUP_PATH }}" --dirs-only
