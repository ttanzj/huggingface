name: Backup HF Datasets to WebDAV

on:
  schedule:
    - cron: '0 0 * * *'      # 北京时间每天早上 8:00
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      WEBDAV_HOST: ${{ secrets.WEBDAV_HOST }}
      WEBDAV_USER: ${{ secrets.WEBDAV_USER }}
      WEBDAV_PASS: ${{ secrets.WEBDAV_PASS }}
      BACKUP_PATH: "/huggingface"

    strategy:
      matrix:
        dataset:
          # - "ttanz/sun"
          - "ttanz/openlist"
          # - "org-name/private-dataset"

    steps:
      - name: Install minimal dependencies
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y rclone --no-install-recommends -qq
          python3 -m pip install "huggingface_hub[cli]" --quiet --no-cache-dir

      - name: Configure rclone WebDAV
        run: |
          set -euo pipefail
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf << EOF
          [webdav]
          type = webdav
          url = ${WEBDAV_HOST}
          vendor = nextcloud
          user = ${WEBDAV_USER}
          pass = $(rclone obscure "${WEBDAV_PASS}")
          EOF

      - name: Login to Hugging Face
        run: |
          set -euo pipefail
          hf auth login --token $HF_TOKEN
          echo "✅ HF 登录成功"
          hf env

      - name: Generate backup date
        id: date
        run: |
          set -euo pipefail
          echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Backup ${{ matrix.dataset }}
        run: |
          set -euo pipefail
          DATASET="${{ matrix.dataset }}"
          DATASET_NAME=$(echo $DATASET | tr '/' '-')
          BACKUP_DIR="${{ env.BACKUP_PATH }}/${{ env.DATE }}/${DATASET_NAME}"
          
          echo "🚀 开始备份: $DATASET"
          echo "📁 目标路径: $BACKUP_DIR"
          
          rm -rf ./dataset_backup && mkdir -p ./dataset_backup
          
          python3 - <<EOF
          from huggingface_hub import snapshot_download
          snapshot_download(
              repo_id="${DATASET}",
              repo_type="dataset",
              local_dir="./dataset_backup",
              local_dir_use_symlinks=False,
              allow_patterns=["*"]
          )
          print("✅ 数据集下载完成")
          EOF

          echo "📤 正在上传到 WebDAV..."
          rclone mkdir webdav:"${BACKUP_DIR}" --quiet
          rclone sync ./dataset_backup webdav:"${BACKUP_DIR}" \
            --transfers=8 --checkers=16 --quiet

      - name: Cleanup old backups (保留7天 + 最少保留7份)
        if: ${{ job.status == 'success' }}
        run: |
          set -euo pipefail
          cutoff=$(date -d "7 days ago" +%Y-%m-%d)
          backup_list=$(rclone lsd webdav:"/huggingface" 2>/dev/null \
            | awk '{print $5}' \
            | grep -E '^[0-9]{4}-[0-9]{2}-[0-9]{2}$' \
            | sort)

          arr=($backup_list)
          total=${#arr[@]}
          keep_min=7

          echo "📂 当前备份总数: $total"
          echo "⏱️ 过期阈值: $cutoff"

          if [ "$total" -le "$keep_min" ]; then
            echo "🛡️ 备份不足7份，跳过删除"
            exit 0
          fi

          for day in "${arr[@]:0:$((total - keep_min))}"; do
            if [[ "$day" < "$cutoff" ]]; then
              echo "🗑️ 删除: $day"
              rclone purge webdav:"/huggingface/$day" --quiet
            fi
          done

      - name: Show current backups
        if: success()
        run: |
          set -euo pipefail
          echo "📋 当前备份目录："
          rclone lsd webdav:"${{ env.BACKUP_PATH }}" 2>/dev/null | awk '{print $5}' | grep '^[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}$'
