name: Backup HF Datasets to WebDAV

on:
  schedule:
    - cron: '0 0 * * *'      # 每天北京时间早上 8:00 执行（UTC 00:00）
  workflow_dispatch:         # 支持手动触发

jobs:
  backup:
    runs-on: ubuntu-latest
    
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      WEBDAV_HOST: ${{ secrets.WEBDAV_HOST }}
      WEBDAV_USER: ${{ secrets.WEBDAV_USER }}
      WEBDAV_PASS: ${{ secrets.WEBDAV_PASS }}
      BACKUP_PATH: "/huggingface"     # 备份根目录

    strategy:
      matrix:
        dataset:
          - "ttanz/sun"
          - "ttanz/openlist"
          # ==================== 组织下数据集示例 ====================
          # - "org-name/private-dataset"     # 组织下的私有数据集示例
          # - "my-company/research-data"
          # - "another-org/big-dataset"
          # =========================================================

    steps:
      - name: Install dependencies (Optimized)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y rclone

          python3 -m pip install --upgrade pip --quiet
          python3 -m pip install "huggingface_hub[cli]" --quiet --no-cache-dir

      - name: Configure rclone WebDAV
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf << EOF
          [webdav]
          type = webdav
          url = ${WEBDAV_HOST}
          vendor = other
          user = ${WEBDAV_USER}
          pass = $(rclone obscure "${WEBDAV_PASS}")
          EOF

      - name: Login to Hugging Face
        run: |
          huggingface-cli login --token $HF_TOKEN --add-to-git-credential
          echo "✅ Hugging Face 登录成功"

      - name: Generate backup date
        id: date
        run: echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Backup ${{ matrix.dataset }}
        run: |
          DATASET="${{ matrix.dataset }}"
          DATASET_NAME=$(echo $DATASET | tr '/' '-')
          BACKUP_DIR="${{ env.BACKUP_PATH }}/${{ env.DATE }}/${DATASET_NAME}"
          
          echo "🚀 开始备份: $DATASET"
          echo "📁 备份路径: $BACKUP_DIR"
          
          rm -rf ./dataset_backup
          mkdir -p ./dataset_backup
          
          python3 - <<EOF
          from huggingface_hub import snapshot_download
          snapshot_download(
              repo_id="${DATASET}",
              repo_type="dataset",
              local_dir="./dataset_backup",
              local_dir_use_symlinks=False,
              allow_patterns=["*"],
              ignore_patterns=[".gitattributes"]
          )
          print("✅ 数据集下载完成")
          EOF

          echo "📤 正在上传到 WebDAV..."
          rclone mkdir webdav:"${BACKUP_DIR}" --quiet
          
          rclone sync ./dataset_backup webdav:"${BACKUP_DIR}" \
            --transfers=8 \
            --checkers=16 \
            --verbose

      - name: Cleanup old backups (保留7天)
        if: success()
        run: |
          echo "🧹 清理超过7天的旧备份..."
          rclone delete webdav:"${{ env.BACKUP_PATH }}" --min-age 7d --quiet || true

      - name: Show backup list
        if: success()
        run: |
          echo "📋 当前备份列表："
          rclone ls webdav:"${{ env.BACKUP_PATH }}" --dirs-only
