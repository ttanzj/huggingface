name: Keep ttanz/pansou Alive (Daily Random)

on:
  schedule:
    - cron: '*/720 * * * *'   # 每 12 小时一次
  workflow_dispatch:         # 允许手动测试

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Wake up ttanz/pansout Space
        run: |
          echo "🌟 Starting wake up at $(date -u)"
          echo "Target: https://ttanz-pansou.hf.space"
          
          # ✅ 修复：改用 GET 请求，不再使用 -I（HEAD）
          RESPONSE=$(curl -s -L -m 30 \
            -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            -w "HTTP_STATUS:%{http_code}" \
            https://ttanz-pansou.hf.space)
          
          # 提取状态码
          STATUS=$(echo "$RESPONSE" | sed -n 's/.*HTTP_STATUS://p')
          
          echo "✅ Response Status Code: $STATUS"
          
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
            echo "✅ Successfully pinged! Space is awake."
          else
            echo "⚠️  Got unexpected response."
          fi

      - name: Summary
        run: echo "Job completed at $(date -u)"
